qianfanmall:
  # 开发者应该设置成自己的wx相关信息
  wx:
    # 微信小程序配置
    mini-app:
      app-id: wx19431592accd1990  # mall-prod
      app-secret: 6a17d4edfd442e2186b46791180aa055  # mall-prod
      mch-id: 1702609589
      mch-key: Ling1QF010624ZLMLing1QF010624ZLM  # apiV2密钥
      api-v3-key: 0YiQianFan010624zlm0YiQianFan010  # apiV3密钥
      key-path: classpath:wechat-certs/apiclient_cert.p12
      private-key-path: classpath:wechat-certs/apiclient_key.pem
      private-cert-path: classpath:wechat-certs/apiclient_cert.pem
      notify-url: ${qianfanmall.env.domain}/wx/pay/notify
      # 消息推送配置token
      token:
      # 消息推送配置AesKey
      aes-key:
      page-path: pages/index/index
      # 是否使用沙盒环境
      use-sandbox: false
    # 微信公众号配置
    mp:
      app-id: wxc4ae2df6dadccb72  # mall-prod
      app-secret: 8955452e5666a51b1454d320d64cefeb  # mall-prod
      mch-id: 1702609589
      mch-key: Ling1QF010624ZLMLing1QF010624ZLM  # apiV2密钥
      api-v3-key: 0YiQianFan010624zlm0YiQianFan010  # apiV3密钥
      key-path: classpath:wechat-certs/apiclient_cert.p12
      private-key-path: classpath:wechat-certs/apiclient_key.pem
      private-cert-path: classpath:wechat-certs/apiclient_cert.pem
      notify-url: ${qianfanmall.env.domain}/wx/pay/notify
      # 消息推送配置token
      token:
      # 消息推送配置AesKey
      aes-key:
      # 是否使用沙盒环境
      use-sandbox: false

  # 对象存储配置
  storage:
    # 当前工作的对象存储模式，分别是local、aliyun、tencent、qiniu
    active: local
    # 本地对象存储配置信息
    local:
      # 这个地方应该是wx模块的WxStorageController的fetch方法对应的地址
      address: ${qianfanmall.env.domain}/wx/storage/fetch/
      storagePath: ${qianfanmall.storage-path}
    # 阿里云对象存储配置信息
    aliyun:
      endpoint: oss-cn-shenzhen.aliyuncs.com
      accessKeyId: 111111
      accessKeySecret: xxxxxx
      bucketName: qianfanmall
    # 腾讯对象存储配置信息
    # 请参考 https://cloud.tencent.com/document/product/436/6249
    tencent:
      secretId: AKIDOccMr856uoU1Tsa2MQL5aqseBUWRrb5i
      secretKey: XqtgEhIdrupTs4ygaWlkUUXv3w3FiwuD
      region: ap-shanghai
      bucketName: vytech-1300096589
    # 七牛云对象存储配置信息
    qiniu:
      endpoint: http://pd5cb6ulu.bkt.clouddn.com
      accessKey: 111111
      secretKey: xxxxxx
      bucketName: qianfanmall

  # thread pool configuration
  thread-pool:
    core-pool-size: 6
    max-pool-size: 12
    queue-capacity: 300
    keep-alive-seconds: 30

  #通知相关配置
  notify:
    mail:
      # 邮件通知配置,邮箱一般用于接收业务通知例如收到新的订单，sendto 定义邮件接收者，通常为商城运营人员
      enable: false
      host: smtp.exmail.qq.com
      username: ex@ex.com.cn
      password: XXXXXXXXXXXXX
      send-from: ex@ex.com.cn
      send-to: ex@qq.com
      port: 465
    # 短消息模版通知配置
    # 短信息用于通知客户，例如发货短信通知，注意配置格式；template-name，template-templateId 请参考 NotifyType 枚举值
    sms:
      enable: false
      # 如果是腾讯云短信，则设置active的值tencent
      # 如果是阿里云短信，则设置active的值aliyun
      active: tencent
      sign: qianfanmall
      template:
        - name: paySucceed
          templateId: 156349
        - name: captcha
          templateId: 156433
        - name: ship
          templateId: 158002
        - name: refund
          templateId: 159447
      tencent:
        appid: 111111111
        app-key: xxxxxxxxxxxxxx
      aliyun:
        regionId: xxx
        accessKeyId: xxx
        accessKeySecret: xxx

  # 快鸟物流查询配置
  express:
    enable: false
    appId: "XXXXXXXXX"
    appKey: "XXXXXXXXXXXXXXXXXXXXXXXXX"
    vendors:
      - code: "JD"
        name: "京东物流"
      - code: "SF"
        name: "顺丰速运"
      - code: "ZTO"
        name: "中通快递"
      - code: "YTO"
        name: "圆通速递"
      - code: "STO"
        name: "申通快递"
      - code: "DYD"
        name: "韵达速递"
      - code: "EMS"
        name: "EMS"
      - code: "YZPY"
        name: "邮政快递包裹"
      - code: "DBL"
        name: "德邦快递"
      - code: "JT"
        name: "极兔速递"
