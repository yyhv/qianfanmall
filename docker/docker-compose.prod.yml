version: '3.8'

services:
  qianfanmall:
    image: ${DOCKER_USERNAME:-your-docker-hub-username}/qianfanmall:latest
    container_name: qianfanmall
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/storage
      - ./logs:/logs
      - ./backup:/backup
    environment:
      - TZ=Asia/Shanghai
      # 连接服务器上已有的 MySQL，使用 host.docker.internal 访问宿主机
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/qianfanmall?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-qianfanmall}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-qianfanmall123456}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/admin/index/index"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
